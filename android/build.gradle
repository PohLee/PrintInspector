allprojects {
    repositories {
        google()
        mavenCentral()
    }
}

rootProject.buildDir = "../build"
subprojects {
    project.buildDir = "${rootProject.buildDir}/${project.name}"
}
subprojects {
    project.evaluationDependsOn(":app")
}

subprojects {
    // Provide a dummy flutter object to old plugins (like nsd_android 2.2.0) that try to read flutter.compileSdkVersion directly
    project.ext.set("flutter", [
        compileSdkVersion: 34,
        minSdkVersion: 21,
        targetSdkVersion: 34,
        ndkVersion: "25.1.8937393"
    ])
}

tasks.register("clean", Delete) {
    delete rootProject.buildDir
}
